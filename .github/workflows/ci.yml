name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  
  type-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
            node-version: 22
            cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check
  
  build:
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
            node-version: 22
            cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
            node-version: 22
            cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test
  
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      SESSION_SECRET: test-secret

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
            node-version: 22
            cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests
        run: npm run test:integration
